<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>DoodleMagic — Brutal Studio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      /* Brutalist Color Palette: High contrast, stark, unpolished */
      --brutal-bg: #c0c0c0; /* Classic Windows 95 Grey */
      --brutal-white: #ffffff;
      --brutal-black: #000000;
      --brutal-accent: #FF00FF; /* Stark Magenta */
      --brutal-secondary: #00FFFF; /* Stark Cyan */
      --brutal-yellow: #FFFF00;
    }

    body {
      font-family: 'Space Mono', monospace;
      background-color: var(--brutal-bg);
      color: var(--brutal-black);
      overflow: hidden;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
      /* Add a raw, grid-like pattern to the background */
      background-image: linear-gradient(var(--brutal-black) 1px, transparent 1px),
                        linear-gradient(90deg, var(--brutal-black) 1px, transparent 1px);
      background-size: 40px 40px;
      background-position: -1px -1px;
    }

    /* NOTE: Keeping the "clay-" class names so your React app doesn't break, 
      but completely rewriting their behavior to be Brutalist.
    */

    .clay-surface {
      background: var(--brutal-white);
      border: 4px solid var(--brutal-black);
      box-shadow: 8px 8px 0px var(--brutal-black);
      border-radius: 0;
    }

    .clay-card {
      background: var(--brutal-white);
      border: 4px solid var(--brutal-black);
      box-shadow: 12px 12px 0px var(--brutal-black);
      border-radius: 0;
    }

    .clay-btn {
      background: var(--brutal-white);
      border: 3px solid var(--brutal-black);
      border-radius: 0;
      box-shadow: 6px 6px 0px var(--brutal-black);
      transition: transform 0.05s linear, box-shadow 0.05s linear, background-color 0.1s;
      text-transform: uppercase;
      font-weight: bold;
      position: relative;
    }
    
    .clay-btn:hover {
      background: var(--brutal-yellow);
    }

    /* Harsh, mechanical click effect (translates down to "crush" the shadow) */
    .clay-btn:active {
      transform: translate(6px, 6px) !important;
      box-shadow: 0px 0px 0px var(--brutal-black) !important;
      background: var(--brutal-secondary);
    }

    /* Active states invert colors or go high-contrast */
    .clay-btn-active {
      background: var(--brutal-black) !important;
      color: var(--brutal-white) !important;
      box-shadow: 6px 6px 0px var(--brutal-accent) !important;
    }

    .clay-inset {
      background: var(--brutal-bg);
      border: 3px solid var(--brutal-black);
      border-radius: 0;
      /* Hard inner shadow */
      box-shadow: inset 4px 4px 0px rgba(0,0,0,0.2); 
    }

    /* Animations - Brutalism favors jerky, mechanical movements over smooth easing */
    @keyframes float {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(-4px, -4px); }
    }
    /* steps() makes it choppy like a retro gif */
    .animate-float { animation: float 0.8s steps(2, end) infinite; }

    @keyframes wobble {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(-5deg); background: var(--brutal-secondary); }
      75% { transform: rotate(5deg); background: var(--brutal-accent); }
    }
    .hover-wobble:hover { animation: wobble 0.2s steps(2, end) infinite; }

    /* Layout Utils */
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    .canvas-frame {
      padding: 1rem;
      background: var(--brutal-white);
      border: 6px solid var(--brutal-black);
      box-shadow: 16px 16px 0px var(--brutal-black);
      border-radius: 0;
    }
    
    @media (max-width: 768px) {
      .canvas-frame { 
        padding: 0.5rem; 
        border: 4px solid var(--brutal-black);
        box-shadow: 8px 8px 0px var(--brutal-black);
      }
      .clay-card { 
        box-shadow: 8px 8px 0px var(--brutal-black); 
      }
    }
  </style>
