
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>DoodleMagic — Clay Studio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --clay-bg: #E8EEF5;
      --clay-white: #ffffff;
      --clay-shadow: rgba(160, 175, 195, 0.6);
      --clay-highlight: rgba(255, 255, 255, 0.9);
      --clay-accent: #7C3AED;
    }

    body {
      font-family: 'Fredoka', sans-serif;
      background-color: var(--clay-bg);
      overflow: hidden;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: none;
    }

    /* Claymorphism Core */
    .clay-surface {
      background: #E8EEF5;
      box-shadow: 12px 12px 24px var(--clay-shadow), 
                  -8px -8px 16px var(--clay-highlight);
      border: 1px solid rgba(255, 255, 255, 0.4);
    }

    .clay-card {
      background: #F0F4F8;
      border-radius: 2.5rem;
      box-shadow: 20px 20px 40px var(--clay-shadow), 
                  -10px -10px 20px var(--clay-highlight);
      border: 1px solid rgba(255, 255, 255, 0.6);
    }

    .clay-btn {
      background: #F0F4F8;
      border-radius: 1.5rem;
      box-shadow: 6px 6px 12px var(--clay-shadow), 
                  -4px -4px 8px var(--clay-highlight),
                  inset 2px 2px 4px rgba(255,255,255,0.4);
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      border: none;
      position: relative;
    }
    
    .clay-btn:active {
      box-shadow: inset 6px 6px 12px var(--clay-shadow), 
                  inset -4px -4px 8px var(--clay-highlight);
      transform: scale(0.94);
    }

    .clay-btn-active {
      background: var(--clay-accent);
      color: white;
      box-shadow: inset 4px 4px 8px rgba(0,0,0,0.2), 
                  inset -4px -4px 8px rgba(255,255,255,0.2);
    }

    .clay-inset {
      background: #E4EBF2;
      box-shadow: inset 8px 8px 16px var(--clay-shadow), 
                  inset -6px -6px 12px var(--clay-highlight);
      border-radius: 2rem;
    }

    /* Animations */
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .animate-float { animation: float 3s ease-in-out infinite; }

    @keyframes wobble {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(-4deg); }
      75% { transform: rotate(4deg); }
    }
    .hover-wobble:hover { animation: wobble 0.5s ease-in-out infinite; }

    /* Layout Utils */
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    .canvas-frame {
      padding: 1.25rem;
      background: #E8EEF5;
      border-radius: 3rem;
      box-shadow: 30px 30px 60px var(--clay-shadow), 
                  -20px -20px 40px var(--clay-highlight);
    }
    
    @media (max-width: 768px) {
      .canvas-frame { padding: 0.75rem; border-radius: 2rem; }
      .clay-card { border-radius: 2rem; }
    }
  </style>
  <script type="importmap">
  {
    "imports": {
      "react/": "https://esm.sh/react@^19.2.4/",
      "react": "https://esm.sh/react@^19.2.4",
      "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
      "lucide-react": "https://esm.sh/lucide-react@0.460.0",
      "@google/genai": "https://esm.sh/@google/genai@^1.41.0"
    }
  }
  </script>
<link rel="stylesheet" href="/index.css">
</head>
<body>
  <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
